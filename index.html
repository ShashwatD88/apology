<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sanjana ❤️</title>
    <!-- Google Fonts for gorgeous typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Canvas for floating background hearts & falling roses -->
    <canvas id="ambient-canvas"></canvas>

    <div class="container">
        <!-- Pulse Heart Trigger -->
        <div id="heart-wrapper" class="heart-wrapper">
            <div class="heart-pulse-glow"></div>
            <button id="heart-trigger-btn" class="heart-btn">
                <svg viewBox="0 0 32 29.6" class="pulsing-heart-svg">
                    <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                    c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
                </svg>
            </button>
            <p id="click-instruction" class="click-instruction">Click to open my heart...</p>
        </div>

        <!-- Apology Card containing the beautiful message -->
        <div id="apology-card" class="apology-card hidden">
            <h1 class="script-font glowing-text">Sorry Baby!</h1>
            <div class="message-separator">
                <span class="dot"></span>
                <span class="heart-icon">❤</span>
                <span class="dot"></span>
            </div>
            
            <div class="apology-text-wrapper">
                <p id="apology-message" class="apology-message"></p>
            </div>
            
            <p class="authorship">
                From <span class="highlight">Akhil Sambanni</span> to <span class="highlight">Sanjana savantanavar</span>
            </p>
        </div>
    </div>

    <!-- Music Control (floating button in corner) -->
    <button id="music-toggle-btn" class="music-toggle-btn hidden" title="Toggle Music">
        <!-- Play Icon -->
        <span class="music-icon-state play-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        </span>
        <!-- Pause Icon -->
        <span class="music-icon-state pause-icon hidden">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        </span>
    </button>

    <script src="script.js"></script>
</body>
</html>
